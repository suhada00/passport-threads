<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Passport Threads</title>
  <meta name="description" content="Oops! The page you are looking for does not exist on Passport Threads. Go back to generate your AI satirical passport card.">
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    .error-container {
      max-width: 500px;
      margin: var(--space-16) auto;
      text-align: center;
      background: white;
      padding: var(--space-10) var(--space-6);
      border-radius: var(--radius-xl);
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
    }
    .error-icon {
      font-size: 80px;
      line-height: 1;
      margin-bottom: var(--space-2);
    }
    .error-title {
      font-size: var(--font-size-3xl);
      font-weight: 900;
      color: var(--color-primary);
    }
    .error-desc {
      color: var(--color-text-muted);
      font-size: var(--font-size-base);
      line-height: 1.6;
      margin-bottom: var(--space-6);
    }
  </style>
</head>
<body class="state-idle">
  <!-- HEADER -->
  <header class="header" role="banner">
    <nav class="navbar container" aria-label="Main navigation">
      <a href="/" class="logo" aria-label="Passport Threads Home">
        <span aria-hidden="true">🛂</span>
        <span class="logo-text">Passport Threads</span>
      </a>
    </nav>
  </header>

  <main id="main" class="container">
    <div class="error-container">
      <div class="error-icon" aria-hidden="true">🕵️‍♂️</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-desc">
        We searched everywhere but couldn't locate this passport gate! 
        Maybe the URL has a typo, or the page took off on an international flight.
      </p>
      <a href="/" class="btn btn--primary">
        Back to Generator 🛂
      </a>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer" role="contentinfo">
    <div class="container footer-inner">
      <p class="footer-copy" style="border: none; padding: 0;">
        © 2026 Passport Threads · For entertainment purposes only
      </p>
    </div>
  </footer>
</body>
</html>
