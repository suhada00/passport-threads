  <line x1="112" y1="48" x2="112" y2="464" stroke="#d4af37" stroke-width="6" />
  
  <!-- Passport Title -->
  <text x="256" y="140" fill="#d4af37" font-family="'Inter', sans-serif" font-size="44" font-weight="900" letter-spacing="8" text-anchor="middle">PASSPORT</text>
  
  <!-- Emblem: Stylized Globe & Threads Logo -->
  <circle cx="256" cy="270" r="80" stroke="#d4af37" stroke-width="8" stroke-dasharray="16 8" />
  <circle cx="256" cy="270" r="50" stroke="#d4af37" stroke-width="6" />
  
